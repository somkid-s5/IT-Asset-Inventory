
services:
  postgres:
    image: postgres:15-alpine
    container_name: infrapilot_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-infrapilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe#Postgres2026!}
      POSTGRES_DB: ${POSTGRES_DB:-infrapilot_db}
#    ports:
#      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - infrapilot_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: infrapilot_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@infrapilot.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-ChangeMe#PgAdmin2026!}
#    ports:
#      - "5050:80"
    networks:
      - infrapilot_network
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infrapilot_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-infrapilot}:${POSTGRES_PASSWORD:-ChangeMe%23Postgres2026!}@postgres:5432/${POSTGRES_DB:-infrapilot_db}?schema=public
      - JWT_SECRET=${JWT_SECRET:-ChangeMe-JWT-Secret-2026-Long-Random-Value}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-ChangeMe#Admin2026!}
      - DEFAULT_EDITOR_PASSWORD=${DEFAULT_EDITOR_PASSWORD:-ChangeMe#Editor2026!}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PORT=3001
    command: sh -c "npx prisma migrate deploy && npm run start:prod"
    networks:
      - infrapilot_network
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    container_name: infrapilot_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
    networks:
      - infrapilot_network
    depends_on:
      - backend

networks:
  infrapilot_network:
    driver: bridge

volumes:
  postgres_data:
